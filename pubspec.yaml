name: galery_app
description: App de galería animada con estilo glassmorphism
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  photo_manager: ^3.0.0
  permission_handler: ^11.0.0
  video_player: ^2.8.1
  http: ^1.1.0
  share_plus: ^7.2.1
  photo_view: ^0.14.0
  path_provider: ^2.1.1
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1
  shared_preferences: ^2.3.0
  animations: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
